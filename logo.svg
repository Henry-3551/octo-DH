<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Henrify Translator Logo</title>
  <desc id="desc">Interlocking speech bubbles on a gradient orb symbolizing multilingual conversations.</desc>
  <defs>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59e8ff" />
      <stop offset="50%" stop-color="#3d7bff" />
      <stop offset="100%" stop-color="#5620ff" />
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#c7d7ff" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="bubbleSecondary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c6feff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#8dd4ff" stop-opacity="0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020615" flood-opacity="0.45" />
    </filter>
  </defs>
  <circle cx="80" cy="80" r="70" fill="url(#orb)" filter="url(#shadow)" />
